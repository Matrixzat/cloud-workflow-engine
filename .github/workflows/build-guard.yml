name: Build Guard Binary (libcipher.so)

on:
  workflow_dispatch:

concurrency:
  group: build-guard-so
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set up Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: |
          yes | sdkmanager "ndk;25.2.9519653" 2>/dev/null || true
          echo "NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Download OLLVM clang-19
        run: |
          ASSET_ID=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/ollvm-clang-linux" \
            | jq -r '.assets[]? | select(.name=="ollvm-clang-linux-x86_64.tar.xz") | .id' | head -1)
          curl -L -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
            -o ollvm.tar.xz
          tar -xJf ollvm.tar.xz && rm ollvm.tar.xz
          chmod +x ollvm-install/bin/clang++
          echo "OLLVM: $(ollvm-install/bin/clang++ --version | head -1)"
          echo "OLLVM_BIN=$PWD/ollvm-install/bin/clang++" >> $GITHUB_ENV

      - name: Download source
        run: |
          ASSET_ID=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/ollvm-clang-linux" \
            | jq -r '.assets[]? | select(.name=="guard_src.zip") | .id' | head -1)
          curl -L -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
            -o guard_src.zip
          unzip -q guard_src.zip -d cpp/
          rm guard_src.zip
          echo "Source ready: $(ls cpp/)"

      - name: Resolve toolchain paths
        run: |
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_LINK_ARM64=$TC/bin/aarch64-linux-android26-clang++"    >> $GITHUB_ENV
          echo "NDK_LINK_ARM32=$TC/bin/armv7a-linux-androideabi26-clang++" >> $GITHUB_ENV
          echo "SYSROOT=$TC/sysroot"                                       >> $GITHUB_ENV

      - name: Confirm OLLVM passes
        run: |
          echo "int x;" > /tmp/probe.c
          if "$OLLVM_BIN" --target=aarch64-linux-android26 \
               --sysroot="$SYSROOT" -mllvm -fla \
               -x c -c /tmp/probe.c -o /tmp/probe.o 2>/dev/null; then
            echo "OLLVM_FLAGS=-mllvm -fla -mllvm -bcf -mllvm -bcf_prob=80 -mllvm -bcf_loop=2 -mllvm -sub -mllvm -sobf" >> $GITHUB_ENV
            echo "✅ OLLVM passes confirmed (fla + bcf + sub + sobf)"
          else
            echo "OLLVM_FLAGS=" >> $GITHUB_ENV
            echo "⚠️  OLLVM probe failed — building plain"
          fi

      - name: Build libcipher.so
        run: |
          set -e
          SRC="cpp"
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"

          CPP_STATIC_ARM64=$(find "$TC" -name "libc++_static.a" | grep  "aarch64" | head -1)
          CPP_ABI_ARM64=$(   find "$TC" -name "libc++abi.a"     | grep  "aarch64" | head -1)
          CPP_STATIC_ARM32=$(find "$TC" -name "libc++_static.a" | grep -v "aarch64" | head -1)
          CPP_ABI_ARM32=$(   find "$TC" -name "libc++abi.a"     | grep -v "aarch64" | head -1)

          COMMON=(
            --sysroot="$SYSROOT"
            -fPIC -O2 -g0
            -fno-unwind-tables -fno-asynchronous-unwind-tables
            -fexceptions -frtti
            -fvisibility=hidden
            -ffunction-sections -fdata-sections
            -D__ANDROID__ -DANDROID
            -I"$SRC"
          )
          if [ -n "$OLLVM_FLAGS" ]; then
            read -ra OF <<< "$OLLVM_FLAGS"
            COMMON+=("${OF[@]}")
          fi

          # ── arm64-v8a ──────────────────────────────────────────────────────
          echo "Building arm64-v8a…"
          "$OLLVM_BIN" --target=aarch64-linux-android26 \
            "${COMMON[@]}" -std=c++17 -c "$SRC/guard.cpp" -o guard_arm64.o
          "$NDK_LINK_ARM64" --sysroot="$SYSROOT" \
            -shared -fPIC -Wl,--gc-sections -Wl,--build-id=none \
            -nostdlib++ "$CPP_STATIC_ARM64" "$CPP_ABI_ARM64" \
            -llog -lz -lm guard_arm64.o -o libcipher_arm64.so
          echo "  ✅ arm64 — $(wc -c < libcipher_arm64.so) bytes"

          # ── armeabi-v7a ────────────────────────────────────────────────────
          echo "Building armeabi-v7a…"
          "$OLLVM_BIN" --target=armv7a-linux-androideabi26 \
            "${COMMON[@]}" -std=c++17 -c "$SRC/guard.cpp" -o guard_armeabi.o
          "$NDK_LINK_ARM32" --sysroot="$SYSROOT" \
            -shared -fPIC -Wl,--gc-sections -Wl,--build-id=none \
            -nostdlib++ "$CPP_STATIC_ARM32" "$CPP_ABI_ARM32" \
            -llog -lz -lm guard_armeabi.o -o libcipher_armeabi.so
          echo "  ✅ armeabi — $(wc -c < libcipher_armeabi.so) bytes"

          # Wipe source from runner immediately after compile
          rm -rf cpp/ guard_arm64.o guard_armeabi.o

      - name: Strip + harden
        run: |
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          for SO in libcipher_arm64.so libcipher_armeabi.so; do
            "$TC/bin/llvm-strip" --strip-all "$SO"
            for SEC in .symtab .strtab .comment .note.android.ident .eh_frame .eh_frame_hdr; do
              "$TC/bin/llvm-objcopy" --remove-section="$SEC" "$SO" 2>/dev/null || true
            done
            echo "$SO → $(wc -c < $SO) bytes"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cipher-binaries
          retention-days: 90
          path: |
            libcipher_arm64.so
            libcipher_armeabi.so
