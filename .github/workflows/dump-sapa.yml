name: Dump Sapa TV DEX

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # STEP 1: Static jiagu_unpacker (no emulator, ~1 min)
  # ─────────────────────────────────────────────
  static-unpack:
    runs-on: ubuntu-latest
    outputs:
      got_real_dex: ${{ steps.check.outputs.got_real_dex }}
    steps:
      - name: Download Sapa TV APK
        run: |
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" \
            -O SapaTV.apk
          echo "APK: $(ls -lh SapaTV.apk | awk '{print $5}')"

      - name: Static jiagu_unpacker (AES/XOR offline decrypt)
        run: |
          pip3 install -q pycryptodome
          git clone -q --depth=1 \
            https://x-access-token:${{ github.token }}@github.com/SafaSafari/jiagu_unpacker.git
          mkdir -p dumped_dex
          python3 jiagu_unpacker/jiagu_unpacker.py -apk SapaTV.apk -out dumped_dex 2>&1 || true

      - name: Check result — only count classes*.dex (not shell.dex)
        id: check
        run: |
          echo "=== Output files ==="
          find dumped_dex -type f -exec ls -lh {} \; 2>/dev/null || echo "none"
          COUNT=$(find dumped_dex -name "classes*.dex" 2>/dev/null | wc -l)
          echo "Real DEX count: $COUNT"
          echo "got_real_dex=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload if static succeeded
        if: steps.check.outputs.got_real_dex > 0
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-static-dex
          path: dumped_dex/
          retention-days: 7

  # ─────────────────────────────────────────────
  # STEP 2: Runtime dump — only if static got nothing
  # CodingGay/BlackDex prebuilt + frida-dexdump fallback
  # ─────────────────────────────────────────────
  runtime-dump:
    runs-on: ubuntu-latest
    needs: static-unpack
    if: needs.static-unpack.outputs.got_real_dex == '0' || needs.static-unpack.outputs.got_real_dex == ''
    timeout-minutes: 45
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Sapa TV APK + BlackDex prebuilt APK
        run: |
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" \
            -O SapaTV.apk
          wget -q "https://github.com/CodingGay/BlackDex/releases/download/v3.2/app-BlackDex64.apk" \
            -O BlackDex.apk
          echo "SapaTV: $(ls -lh SapaTV.apk | awk '{print $5}')"
          echo "BlackDex: $(ls -lh BlackDex.apk | awk '{print $5}')"

      - name: Run emulator + BlackDex + frida-dexdump fallback
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel
          target: google_apis
          avd-name: SapaDumpAVD
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: |
            mkdir -p dumped_dex

            echo "=== Installing APKs ==="
            adb install -r SapaTV.apk  && echo "Sapa TV OK"
            adb install -r BlackDex.apk && echo "BlackDex OK"

            BPKG=$(adb shell pm list packages 2>/dev/null \
              | grep -i black | tr -d r | cut -d: -f2 | head -1)
            echo "BlackDex pkg: $BPKG"

            adb shell pm grant "$BPKG" android.permission.READ_EXTERNAL_STORAGE  2>/dev/null || true
            adb shell pm grant "$BPKG" android.permission.WRITE_EXTERNAL_STORAGE 2>/dev/null || true
            adb shell appops set "$BPKG" MANAGE_EXTERNAL_STORAGE allow              2>/dev/null || true

            echo "=== Launch Sapa TV (init Jiagu loader) ==="
            adb shell monkey -p com.mm.droid.livetv.mobile31027704 \
              -c android.intent.category.LAUNCHER 1 || true
            sleep 10

            echo "=== Launch BlackDex ==="
            adb shell am start \
              -n "$BPKG/top.niunaijun.blackdex.MainActivity" \
              --es packageName "com.mm.droid.livetv.mobile31027704" 2>/dev/null || \
            adb shell monkey -p "$BPKG" -c android.intent.category.LAUNCHER 1 || true

            echo "Waiting 90s for BlackDex to dump..."
            sleep 90

            adb pull /sdcard/BlackDex/com.mm.droid.livetv.mobile31027704/ ./dumped_dex/ 2>/dev/null || \
            adb pull /sdcard/BlackDex/ ./dumped_dex/ 2>/dev/null || true

            COUNT=$(find dumped_dex -name "*.dex" | wc -l)
            echo "BlackDex result: $COUNT dex files"

            # frida-dexdump fallback if BlackDex got nothing
            if [ "$COUNT" -lt 1 ]; then
              echo "=== frida-dexdump fallback ==="
              pip3 install -q frida-tools frida-dexdump
              FV=$(python3 -c "import frida; print(frida.__version__)")
              wget -q "https://github.com/frida/frida/releases/download/${FV}/frida-server-${FV}-android-x86_64.xz" -O fs.xz
              xz -d fs.xz
              mv frida-server-*android-x86_64 frida-bin 2>/dev/null || mv frida-server-* frida-bin
              adb push frida-bin /data/local/tmp/frida-server
              adb shell "chmod +x /data/local/tmp/frida-server && /data/local/tmp/frida-server &"
              sleep 5
              adb shell monkey -p com.mm.droid.livetv.mobile31027704 \
                -c android.intent.category.LAUNCHER 1 || true
              sleep 20
              frida-dexdump -U -f com.mm.droid.livetv.mobile31027704 \
                -o ./dumped_dex/ || true
            fi

            echo "=== Final ==="
            find dumped_dex -type f | xargs ls -lh 2>/dev/null || echo "Nothing dumped"

      - name: Upload runtime result
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-runtime-dex
          path: dumped_dex/
          retention-days: 7
