name: Dump Sapa TV DEX (BlackDex + Cache)

on:
  workflow_dispatch:

env:
  SDK_ROOT: /home/runner/android-sdk
  SDKMANAGER: /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager
  AVDMANAGER: /home/runner/android-sdk/cmdline-tools/latest/bin/avdmanager
  ADB: /home/runner/android-sdk/platform-tools/adb
  EMULATOR: /home/runner/android-sdk/emulator/emulator

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache cmdline-tools
        uses: actions/cache@v4
        id: cache-cmdtools
        with:
          path: /home/runner/android-sdk/cmdline-tools
          key: android-cmdtools-11076708-v1

      - name: Install cmdline-tools (if not cached)
        if: steps.cache-cmdtools.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mkdir -p $SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $SDK_ROOT/cmdline-tools/latest/

      - name: Cache Android system image
        uses: actions/cache@v4
        id: cache-sysimg
        with:
          path: /home/runner/android-sdk/system-images
          key: android-sysimg-30-google-x86_64-v1

      - name: Cache platform-tools + emulator + platforms
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: |
            /home/runner/android-sdk/platform-tools
            /home/runner/android-sdk/emulator
            /home/runner/android-sdk/platforms
          key: android-platform-tools-30-v1

      - name: Install SDK packages
        run: |
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          if [ "${{ steps.cache-tools.outputs.cache-hit }}" != "true" ]; then
            echo "Installing platform-tools, emulator..."
            $SDKMANAGER "platform-tools" "platforms;android-30" "emulator"
          fi
          if [ "${{ steps.cache-sysimg.outputs.cache-hit }}" != "true" ]; then
            echo "Installing system image (large download ~1GB)..."
            $SDKMANAGER "system-images;android-30;google_apis;x86_64"
          fi

      - name: Cache BlackDex APK
        uses: actions/cache@v4
        id: cache-blackdex
        with:
          path: /home/runner/blackdex/BlackDex.apk
          key: blackdex-built-v1

      - name: Build BlackDex from source (if not cached)
        if: steps.cache-blackdex.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/hluwa/BlackDex.git /home/runner/blackdex-src
          cd /home/runner/blackdex-src
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon -q 2>&1 | tail -10 || \
          ./gradlew assembleDebug --no-daemon -q 2>&1 | tail -10 || \
          ./gradlew assembleRelease --no-daemon -q 2>&1 | tail -10
          mkdir -p /home/runner/blackdex
          APK=$(find /home/runner/blackdex-src -name "*.apk" | grep -v unsigned | head -1)
          echo "Found APK: $APK"
          cp "$APK" /home/runner/blackdex/BlackDex.apk
          ls -lh /home/runner/blackdex/BlackDex.apk

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-frida-v1

      - name: Create AVD
        run: |
          echo "no" | $AVDMANAGER create avd \
            -n sapa_avd \
            -k "system-images;android-30;google_apis;x86_64" \
            --force

      - name: Start emulator
        run: |
          $EMULATOR -avd sapa_avd \
            -no-window -no-audio -no-snapshot \
            -gpu swiftshader_indirect \
            -no-boot-anim &
          echo "Waiting for boot..."
          $ADB wait-for-device
          timeout 300 bash -c 'until /home/runner/android-sdk/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do sleep 5; echo "still booting..."; done'
          $ADB shell input keyevent 82
          $ADB shell settings put global window_animation_scale 0
          $ADB shell settings put global transition_animation_scale 0
          $ADB shell settings put global animator_duration_scale 0
          echo "Emulator ready"

      - name: Install Sapa TV APK
        run: |
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" -O SapaTV.apk
          echo "APK size: $(ls -lh SapaTV.apk | awk '{print $5}')"
          $ADB install -r SapaTV.apk
          echo "Sapa TV installed OK"

      - name: Install BlackDex + grant permissions
        run: |
          $ADB install -r /home/runner/blackdex/BlackDex.apk
          BPKG=$($ADB shell pm list packages 2>/dev/null | grep -i black | tr -d '\r' | cut -d: -f2 | head -1)
          echo "BlackDex package: $BPKG"
          echo "BLACKDEX_PKG=$BPKG" >> $GITHUB_ENV
          $ADB shell pm grant "$BPKG" android.permission.READ_EXTERNAL_STORAGE  2>/dev/null || true
          $ADB shell pm grant "$BPKG" android.permission.WRITE_EXTERNAL_STORAGE 2>/dev/null || true
          $ADB shell appops set "$BPKG" MANAGE_EXTERNAL_STORAGE allow 2>/dev/null || true

      - name: Run BlackDex dump
        run: |
          TARGET="com.mm.droid.livetv.mobile31027704"
          $ADB shell monkey -p $TARGET -c android.intent.category.LAUNCHER 1 2>/dev/null || true
          sleep 8
          $ADB shell am start -n "$BLACKDEX_PKG/top.niunaijun.blackdex.MainActivity" \
            --es packageName "$TARGET" 2>/dev/null || \
          $ADB shell am start -n "$BLACKDEX_PKG/.MainActivity" \
            --es packageName "$TARGET" 2>/dev/null || \
          $ADB shell monkey -p "$BLACKDEX_PKG" -c android.intent.category.LAUNCHER 1 2>/dev/null || true
          echo "Waiting 120s for BlackDex to dump..."
          sleep 120
          mkdir -p dumped_dex
          $ADB pull /sdcard/BlackDex/$TARGET/ ./dumped_dex/ 2>/dev/null || \
          $ADB pull /sdcard/BlackDex/         ./dumped_dex/ 2>/dev/null || true
          echo "BlackDex result: $(find dumped_dex -name *.dex 2>/dev/null | wc -l) dex files"

      - name: Fallback — frida-dexdump if BlackDex empty
        run: |
          COUNT=$(find dumped_dex -name "*.dex" 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 1 ]; then
            echo "BlackDex got nothing — trying frida-dexdump fallback"
            pip3 install -q frida-tools frida-dexdump
            FRIDA_VER=$(python3 -c "import frida; print(frida.__version__)")
            echo "Frida $FRIDA_VER"
            wget -q "https://github.com/frida/frida/releases/download/${FRIDA_VER}/frida-server-${FRIDA_VER}-android-x86_64.xz" -O fs.xz
            xz -d fs.xz && mv frida-server-*-android-x86_64 frida-bin || mv frida-server-* frida-bin
            $ADB push frida-bin /data/local/tmp/frida-server
            $ADB shell "chmod +x /data/local/tmp/frida-server && /data/local/tmp/frida-server &"
            sleep 5
            $ADB shell "monkey -p com.mm.droid.livetv.mobile31027704 -c android.intent.category.LAUNCHER 1" || true
            sleep 20
            frida-dexdump -U -f com.mm.droid.livetv.mobile31027704 -o ./dumped_dex/ || true
          fi
          echo "=== Final dumped files ==="
          find dumped_dex -type f | xargs ls -lh 2>/dev/null || echo "Nothing dumped"

      - name: Upload DEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-dumped-dex
          path: dumped_dex/
          retention-days: 7
