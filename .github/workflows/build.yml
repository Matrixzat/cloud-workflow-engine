name: Cloud Build Engine — Universal APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name'
        required: true
        default: 'My App'
      package_name:
        description: 'Android package name (e.g. com.example.app)'
        required: true
        default: 'com.example.app'
      job_id:
        description: 'Unique job ID generated by the worker — used to name the output artifact'
        required: true
        default: ''
      flutter_version:
        description: 'Flutter version (only used for Flutter projects)'
        required: false
        default: '3.29.1'
      build_mode:
        description: 'Build mode: release | debug | profile'
        required: false
        default: 'release'
      asset_id:
        description: 'Staging asset ID — deleted immediately after source is downloaded'
        required: false
        default: ''
      protect:
        description: 'Enable App Armor 9-layer protection (Flutter only)'
        required: false
        default: 'false'

permissions:
  contents: write   # needed to delete GitHub Release assets via GITHUB_TOKEN

jobs:
  build:
    name: Build ${{ inputs.app_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      APP_NAME:     ${{ inputs.app_name }}
      PACKAGE_NAME: ${{ inputs.package_name }}
      FLUTTER_VER:  ${{ inputs.flutter_version }}
      BUILD_MODE:   ${{ inputs.build_mode }}

    steps:

      # ── 1. System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            unzip wget curl jq python3 apksigner zipalign
          # Pre-install jetifier globally so "jetify" command works instantly
          npm install -g jetifier --silent 2>/dev/null || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 2. Download source ───────────────────────────────────────────────────
      - name: Download source code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/source_raw /tmp/project
          # Download the release asset by ID using the internal token
          curl -L -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${{ inputs.asset_id }}" \
            -o /tmp/source_raw/source.zip
          echo "Source downloaded: $(du -sh /tmp/source_raw/source.zip | cut -f1)"

      # ── Delete source asset, release, and tag immediately after download ───────
      - name: Clean up staging files
        if: ${{ inputs.asset_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}"
          AUTH='-H "Authorization: Bearer '"$GH_TOKEN"'" -H "Accept: application/vnd.github.v3+json"'

          # 1. Delete the specific release asset
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
            "$API/releases/assets/${{ inputs.asset_id }}")
          echo "Asset ${{ inputs.asset_id }} delete → $CODE"

          # 2. Find and delete the build-queue release
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
            "$API/releases/tags/build-queue" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -n "$RELEASE_ID" ]; then
            CODE2=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
              "$API/releases/$RELEASE_ID")
            echo "Release $RELEASE_ID delete → $CODE2"
          else
            echo "Release not found (already gone)"
          fi

          # 3. Delete the git tag ref itself
          CODE3=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
            "$API/git/refs/tags/build-queue")
          echo "Tag ref delete → $CODE3"
          echo "Cleanup complete ✓"

      # ── 3. Extract source ────────────────────────────────────────────────────
      - name: Extract source code
        run: |
          unzip -q /tmp/source_raw/source.zip -d /tmp/source_raw/extracted
          TOP=$(ls /tmp/source_raw/extracted/ | head -1)
          if [ -d "/tmp/source_raw/extracted/$TOP" ] && [ "$(ls /tmp/source_raw/extracted/ | wc -l)" -eq 1 ]; then
            mv "/tmp/source_raw/extracted/$TOP"/* /tmp/project/
          else
            mv /tmp/source_raw/extracted/* /tmp/project/
          fi

          # Auto-relocate: if no project marker at root, search up to 3 levels deep
          if [ ! -f "/tmp/project/pubspec.yaml" ] && \
             [ ! -f "/tmp/project/build.gradle" ] && \
             [ ! -f "/tmp/project/settings.gradle" ] && \
             [ ! -f "/tmp/project/package.json" ]; then
            MARKER=$(find /tmp/project -maxdepth 4 \
              \( -name "pubspec.yaml" -o -name "settings.gradle" -o -name "gradlew" \) \
              ! -path "*/node_modules/*" ! -path "*/.dart_tool/*" | head -1)
            if [ -n "$MARKER" ]; then
              REAL_ROOT=$(dirname "$MARKER")
              echo "Relocating project root from /tmp/project → $REAL_ROOT"
              mkdir -p /tmp/project_real
              cp -r "$REAL_ROOT"/. /tmp/project_real/
              rm -rf /tmp/project
              mv /tmp/project_real /tmp/project
            fi
          fi

          echo "Project root contents:"; ls /tmp/project/

      # ── 3b. Auto-patch gradle.properties ────────────────────────────────────
      - name: Patch gradle.properties for CI compatibility
        run: |
          # Find every gradle.properties in the project (root + any submodule)
          find /tmp/project -name "gradle.properties" | while read GP; do
            echo "── Scanning: $GP"
            CHANGED=0

            # 1. parallel=true → false  (prevents RAM exhaustion on 7 GB runner)
            if grep -q "^org\.gradle\.parallel\s*=\s*true" "$GP"; then
              sed -i 's/^org\.gradle\.parallel\s*=\s*true/org.gradle.parallel=false/' "$GP"
              echo "  ✔ parallel: true → false"
              CHANGED=1
            fi

            # 2. caching=false → true  (enable build cache for speed)
            if grep -q "^org\.gradle\.caching\s*=\s*false" "$GP"; then
              sed -i 's/^org\.gradle\.caching\s*=\s*false/org.gradle.caching=true/' "$GP"
              echo "  ✔ caching: false → true"
              CHANGED=1
            fi

            # 3. configuration-cache=true → false  (unstable on fresh CI runners)
            if grep -q "^org\.gradle\.configuration-cache\s*=\s*true" "$GP"; then
              sed -i 's/^org\.gradle\.configuration-cache\s*=\s*true/org.gradle.configuration-cache=false/' "$GP"
              echo "  ✔ configuration-cache: true → false"
              CHANGED=1
            fi

            # 4. Remove AIDE / AndroidIDE / Termux hardcoded java.home path
            if grep -q "^org\.gradle\.java\.home\s*=" "$GP"; then
              sed -i 's|^org\.gradle\.java\.home\s*=.*|# org.gradle.java.home removed — AIDE path not valid on CI|' "$GP"
              echo "  ✔ org.gradle.java.home — removed (AIDE path)"
              CHANGED=1
            fi

            # 5. Remove AIDE / Termux hardcoded aapt2 override path
            if grep -q "^android\.aapt2FromMavenOverride\s*=" "$GP"; then
              sed -i 's|^android\.aapt2FromMavenOverride\s*=.*|# android.aapt2FromMavenOverride removed — AIDE path not valid on CI|' "$GP"
              echo "  ✔ android.aapt2FromMavenOverride — removed (AIDE path)"
              CHANGED=1
            fi

            # 6. Remove AIDE log-sender flag (harmless but noisy)
            if grep -q "^android\.injected\.logSender\.enable\s*=" "$GP"; then
              sed -i 's|^android\.injected\.logSender\.enable\s*=.*|# android.injected.logSender.enable removed — AIDE only|' "$GP"
              echo "  ✔ android.injected.logSender.enable — removed (AIDE only)"
              CHANGED=1
            fi

            if [ "$CHANGED" -eq 0 ]; then
              echo "  (no changes needed)"
            fi
          done

          # ── Patch local.properties (Flutter / React Native / Expo / Native) ──
          # AIDE / AndroidIDE / Termux write hardcoded device paths here.
          # The workflow sets the real sdk.dir and flutter.sdk later, so we just
          # wipe any stale device paths now so Gradle never sees them.
          find /tmp/project -name "local.properties" | while read LP; do
            echo "── Scanning: $LP"
            CHANGED=0

            # sdk.dir pointing to AIDE / Termux storage
            if grep -q "^sdk\.dir\s*=" "$LP"; then
              sed -i 's|^sdk\.dir\s*=.*|# sdk.dir — cleared by CI (set automatically)|' "$LP"
              echo "  ✔ sdk.dir — cleared (AIDE/Termux path)"
              CHANGED=1
            fi

            # flutter.sdk pointing to AIDE / Termux storage (Flutter projects)
            if grep -q "^flutter\.sdk\s*=" "$LP"; then
              sed -i 's|^flutter\.sdk\s*=.*|# flutter.sdk — cleared by CI (set automatically)|' "$LP"
              echo "  ✔ flutter.sdk — cleared (AIDE path)"
              CHANGED=1
            fi

            # ndk.dir pointing to AIDE / Termux storage
            if grep -q "^ndk\.dir\s*=" "$LP"; then
              sed -i 's|^ndk\.dir\s*=.*|# ndk.dir — cleared by CI (set automatically by sdkmanager)|' "$LP"
              echo "  ✔ ndk.dir — cleared (AIDE path)"
              CHANGED=1
            fi

            if [ "$CHANGED" -eq 0 ]; then
              echo "  (no changes needed)"
            fi
          done

      # ── 4. Detect project type ───────────────────────────────────────────────
      - name: Detect project type
        id: detect
        working-directory: /tmp/project
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "type=flutter" >> $GITHUB_OUTPUT
            echo "Project type: FLUTTER"
          elif [ -f "package.json" ] && [ -d "android" ]; then
            echo "type=reactnative" >> $GITHUB_OUTPUT
            echo "Project type: REACT NATIVE"
          elif [ -f "package.json" ] && ([ -f "app.json" ] || [ -f "expo-env.d.ts" ] || grep -q '"expo"' package.json 2>/dev/null); then
            echo "type=expo" >> $GITHUB_OUTPUT
            echo "Project type: EXPO (React Native — needs prebuild)"
          elif [ -d "unityLibrary" ] || [ -d "launcher" ] && grep -q "unityLibrary" settings.gradle 2>/dev/null || grep -q "unityLibrary" settings.gradle.kts 2>/dev/null; then
            echo "type=android" >> $GITHUB_OUTPUT
            echo "Project type: UNITY ANDROID EXPORT (built as native Gradle)"
          elif [ -f "android/app/build.gradle" ] || [ -f "app/build.gradle" ]; then
            echo "type=android" >> $GITHUB_OUTPUT
            echo "Project type: NATIVE ANDROID (Java/Kotlin)"
          elif [ -f "build.gradle" ] || [ -f "settings.gradle" ] || [ -f "build.gradle.kts" ] || [ -f "settings.gradle.kts" ]; then
            echo "type=android" >> $GITHUB_OUTPUT
            echo "Project type: NATIVE ANDROID (root gradle)"
          else
            # Last resort: search for pubspec.yaml or gradlew anywhere in the tree
            if find . -maxdepth 3 -name "pubspec.yaml" | grep -q .; then
              echo "type=flutter" >> $GITHUB_OUTPUT
              echo "Project type: FLUTTER (deep search)"
            elif find . -maxdepth 3 -name "gradlew" | grep -q .; then
              echo "type=android" >> $GITHUB_OUTPUT
              echo "Project type: NATIVE ANDROID (deep search)"
            else
              echo "type=unknown" >> $GITHUB_OUTPUT
              echo "WARNING: Could not detect project type"
            fi
          fi

      # ── 5a. Set up Flutter (Flutter projects only) ───────────────────────────
      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      # ── 5b. Set up Node.js (React Native / Expo projects) ────────────────────
      - name: Set up Node.js for React Native / Expo
        if: steps.detect.outputs.type == 'reactnative' || steps.detect.outputs.type == 'expo'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 6. Set up Android SDK ────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: >
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses 2>/dev/null || yes | sdkmanager --licenses 2>/dev/null || true

      # ── Install project-specific NDK + compileSdk platform ────────────────────
      - name: Install project-specific NDK and SDK platform
        run: |
          BUILD_GRADLE=$(find /tmp/project/android -name "build.gradle" -path "*/app/build.gradle" | head -1)
          if [ -z "$BUILD_GRADLE" ]; then
            echo "No app/build.gradle found — skipping NDK/SDK auto-install"
            exit 0
          fi

          NDK_VER=$(grep 'ndkVersion' "$BUILD_GRADLE" 2>/dev/null | grep -oP '[\d.]{5,}' | head -1)
          COMPILE_SDK=$(grep 'compileSdk' "$BUILD_GRADLE" 2>/dev/null | grep -oP '\b\d{2}\b' | head -1)
          echo "Detected → ndkVersion: '${NDK_VER}', compileSdk: '${COMPILE_SDK}'"

          if [ -n "$NDK_VER" ]; then
            echo "Installing NDK $NDK_VER..."
            sdkmanager "ndk;$NDK_VER" 2>&1 | tail -4 || true
          fi

          if [ -n "$COMPILE_SDK" ] && [ "$COMPILE_SDK" != "35" ]; then
            echo "Installing platforms;android-${COMPILE_SDK}..."
            sdkmanager "platforms;android-${COMPILE_SDK}" "build-tools;${COMPILE_SDK}.0.0" 2>&1 | tail -4 || true
          fi

          yes | sdkmanager --licenses 2>/dev/null || true
          echo "Done ✓"

      # ── Cache Gradle dependencies ─────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-v2
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Cache npm / node_modules ──────────────────────────────────────────────
      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-v2
          restore-keys: |
            npm-${{ runner.os }}-

      # ── 7. Patch package name & app name ─────────────────────────────────────
      - name: Patch package name and app name
        working-directory: /tmp/project
        run: |
          # Patch AndroidManifest
          find . -name "AndroidManifest.xml" | while read f; do
            OLD=$(grep -oP 'package="\K[^"]+' "$f" | head -1)
            if [ -n "$OLD" ] && [ "$OLD" != "$PACKAGE_NAME" ]; then
              sed -i "s|package=\"${OLD}\"|package=\"${PACKAGE_NAME}\"|g" "$f"
              echo "Patched $f: $OLD → $PACKAGE_NAME"
            fi
          done
          # Patch build.gradle applicationId
          find . -name "build.gradle" | while read f; do
            sed -i "s|applicationId \".*\"|applicationId \"${PACKAGE_NAME}\"|g" "$f"
            sed -i "s|applicationId '.*'|applicationId '${PACKAGE_NAME}'|g" "$f"
          done
          # Patch app name in strings.xml
          find . -name "strings.xml" | while read f; do
            sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" "$f"
          done
          echo "Patching done ✓"

      # ── 8. Set up keystore ────────────────────────────────────────────────────
      # PRIORITY 1: KEYSTORE_BASE64 repo secret  (user added it to their GitHub repo)
      # PRIORITY 2: key.properties + keystore file found inside the uploaded project ZIP
      # PRIORITY 3: CBE embedded default keystore  →  zero-config fallback
      - name: Set up signing keystore
        env:
          # ── Primary secret names (recommended) ─────────────────────────────────
          _USER_KS_B64:   ${{ secrets.KEYSTORE_BASE64 }}
          _USER_ALIAS:    ${{ secrets.KEY_ALIAS }}
          _USER_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          _USER_STR_PASS: ${{ secrets.STORE_PASSWORD }}
          # ── Alternate secret names also accepted ─────────────────────────────────
          _USER_KS_B64_A: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          _USER_KS_B64_B: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          _USER_ALIAS_A:  ${{ secrets.SIGNING_KEY_ALIAS }}
          _USER_ALIAS_B:  ${{ secrets.RELEASE_KEY_ALIAS }}
          _USER_KP_A:     ${{ secrets.SIGNING_KEY_PASSWORD }}
          _USER_KP_B:     ${{ secrets.RELEASE_KEY_PASSWORD }}
          _USER_SP_A:     ${{ secrets.SIGNING_STORE_PASSWORD }}
          _USER_SP_B:     ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          # Resolve secrets: first non-empty value wins
          KS_B64="${_USER_KS_B64:-${_USER_KS_B64_A:-$_USER_KS_B64_B}}"
          U_ALIAS="${_USER_ALIAS:-${_USER_ALIAS_A:-$_USER_ALIAS_B}}"
          U_KEY_PASS="${_USER_KEY_PASS:-${_USER_KP_A:-$_USER_KP_B}}"
          U_STR_PASS="${_USER_STR_PASS:-${_USER_SP_A:-${_USER_SP_B:-$U_KEY_PASS}}}"

          # ── PRIORITY 1: GitHub repo secret ────────────────────────────────────────
          if [ -n "$KS_B64" ]; then
            echo "PRIORITY 1: User keystore via repo secret (KEYSTORE_BASE64)"
            echo "$KS_B64" | base64 -d > /tmp/release.keystore
            echo "storePassword=$U_STR_PASS" >  /tmp/key.properties
            echo "keyPassword=$U_KEY_PASS"   >> /tmp/key.properties
            echo "keyAlias=$U_ALIAS"         >> /tmp/key.properties
            echo "storeFile=/tmp/release.keystore" >> /tmp/key.properties
            echo "SIGNING_SOURCE=user-secret ($U_ALIAS)" >> $GITHUB_ENV
            echo "User keystore (secret) configured ✓  alias: $U_ALIAS"

          else
            # ── PRIORITY 2: Scan project ZIP for key.properties + keystore file ─────
            echo "No KEYSTORE_BASE64 secret — scanning uploaded project for signing config..."
            FOUND_KS=""

            PROJECT_KP=$(find /tmp/project -name "key.properties" \
              -not -path "*/build/*" -not -path "*/node_modules/*" 2>/dev/null | head -1)

            if [ -n "$PROJECT_KP" ]; then
              echo "Found key.properties: $PROJECT_KP"

              # Read all four fields (strip whitespace, quotes, and file() wrapper)
              P_STORE_FILE=$(grep -E "^storeFile\s*=" "$PROJECT_KP" | cut -d= -f2- | \
                sed "s/^[[:space:]]*//;s/[[:space:]]*$//;s/^file(//;s/)$//;s/['\"]//g")
              P_STORE_PASS=$(grep -E "^storePassword\s*=" "$PROJECT_KP" | cut -d= -f2- | \
                sed "s/^[[:space:]]*//;s/[[:space:]]*$//")
              P_KEY_ALIAS=$(grep  -E "^keyAlias\s*="    "$PROJECT_KP" | cut -d= -f2- | \
                sed "s/^[[:space:]]*//;s/[[:space:]]*$//")
              P_KEY_PASS=$(grep   -E "^keyPassword\s*=" "$PROJECT_KP" | cut -d= -f2- | \
                sed "s/^[[:space:]]*//;s/[[:space:]]*$//")

              echo "  storeFile:  $P_STORE_FILE"
              echo "  keyAlias:   $P_KEY_ALIAS"
              echo "  passwords:  $([ -n "$P_KEY_PASS" ] && echo 'set' || echo 'MISSING')"

              if [ -n "$P_STORE_FILE" ] && [ -n "$P_KEY_ALIAS" ] && [ -n "$P_KEY_PASS" ]; then
                KP_DIR=$(dirname "$PROJECT_KP")
                RESOLVED=""

                # 1. Relative to key.properties directory
                if [ -f "$KP_DIR/$P_STORE_FILE" ]; then
                  RESOLVED="$KP_DIR/$P_STORE_FILE"
                # 2. Relative to project root
                elif [ -f "/tmp/project/$P_STORE_FILE" ]; then
                  RESOLVED="/tmp/project/$P_STORE_FILE"
                # 3. Search by filename anywhere in project
                else
                  KS_NAME=$(basename "$P_STORE_FILE")
                  RESOLVED=$(find /tmp/project -name "$KS_NAME" \
                    -not -path "*/build/*" -not -path "*/node_modules/*" 2>/dev/null | head -1)
                fi

                if [ -n "$RESOLVED" ] && [ -f "$RESOLVED" ]; then
                  echo "PRIORITY 2: Project keystore found → $RESOLVED"
                  cp "$RESOLVED" /tmp/release.keystore
                  FINAL_STORE_PASS="${P_STORE_PASS:-$P_KEY_PASS}"
                  echo "storePassword=$FINAL_STORE_PASS" >  /tmp/key.properties
                  echo "keyPassword=$P_KEY_PASS"         >> /tmp/key.properties
                  echo "keyAlias=$P_KEY_ALIAS"           >> /tmp/key.properties
                  echo "storeFile=/tmp/release.keystore"  >> /tmp/key.properties
                  echo "SIGNING_SOURCE=project-zip ($P_KEY_ALIAS)" >> $GITHUB_ENV
                  FOUND_KS="yes"
                  echo "Project keystore configured ✓  alias: $P_KEY_ALIAS"
                else
                  echo "  key.properties found but keystore file not inside ZIP — falling through to CBE default"
                fi
              else
                echo "  key.properties incomplete (missing alias/password) — falling through"
              fi
            else
              echo "No key.properties found in project"
            fi

            # Also scan for any standalone .keystore / .jks files (info only — credentials unknown)
            if [ -z "$FOUND_KS" ]; then
              STANDALONE=$(find /tmp/project -name "*.keystore" -o -name "*.jks" 2>/dev/null | \
                grep -v "/build/" | grep -v "node_modules" | head -1)
              if [ -n "$STANDALONE" ]; then
                echo "Note: standalone keystore found ($STANDALONE) but no key.properties with credentials — CBE default will be used. Include key.properties in your ZIP to use this file."
              fi
            fi

            if [ -z "$FOUND_KS" ]; then
              # ── PRIORITY 3: CBE embedded default ────────────────────────────────────
              echo "PRIORITY 3: No user keystore detected — using CBE default keystore"
              KEYSTORE_B64=""
              echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
              echo "storePassword=CloudBuild@Matrix2026" >  /tmp/key.properties
              echo "keyPassword=CloudBuild@Matrix2026"   >> /tmp/key.properties
              echo "keyAlias=cbe_release_key"            >> /tmp/key.properties
              echo "storeFile=/tmp/release.keystore"     >> /tmp/key.properties
              echo "SIGNING_SOURCE=CBE default (cbe_release_key)" >> $GITHUB_ENV
              echo "CBE keystore ready ✓"
            fi
          fi

      # ── 9. Fix common Gradle issues ──────────────────────────────────────────
      - name: Auto-fix Gradle issues
        working-directory: /tmp/project
        run: |
          find . -name "build.gradle" | xargs sed -i \
            -e "s|compile '|implementation '|g" \
            -e "s|testCompile '|testImplementation '|g" \
            -e "s|provided '|compileOnly '|g" \
            -e "s|compileSdkVersion [0-9]\{1,2\}|compileSdkVersion 35|g" \
            -e "s|targetSdkVersion [0-9]\{1,2\}|targetSdkVersion 35|g" 2>/dev/null || true
          echo "Gradle fixes applied ✓"

      # ── 10a-pre. EXPO: install deps + prebuild → generates android/ folder ───
      - name: Expo prebuild (generate Android project)
        if: steps.detect.outputs.type == 'expo'
        working-directory: /tmp/project
        run: |
          echo "Installing npm dependencies…"
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
          echo "Running expo prebuild to generate android/ folder…"
          npx expo prebuild --platform android --no-install 2>&1 || \
          npx expo-cli eject 2>&1 || true
          echo "Android folder contents after prebuild:"; ls android/ 2>/dev/null || echo "(android/ not created)"

      # ── 10a. BUILD: Flutter ──────────────────────────────────────────────────
      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        working-directory: /tmp/project
        run: |
          # ── Write correct local.properties (Gradle reads this before Flutter can update it)
          FLUTTER_SDK_PATH=$(dirname $(dirname $(which flutter)))
          ANDROID_SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          mkdir -p android
          printf "sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=%s\nflutter.versionName=1.0.0\nflutter.versionCode=1\n" \
            "$ANDROID_SDK" "$FLUTTER_SDK_PATH" "$BUILD_MODE" > android/local.properties
          echo "local.properties written — sdk.dir=$ANDROID_SDK  flutter.sdk=$FLUTTER_SDK_PATH"

          # ── Patch build.gradle for signing if project doesn't already have a keystore configured
          if ! grep -q "key.properties\|storeFile\|matrix_hbc\|release.keystore" android/app/build.gradle; then
            cp /tmp/key.properties android/key.properties
            sed -i '/^android {/i def kp = new Properties(); def kf = rootProject.file("key.properties"); if (kf.exists()) { kp.load(new FileInputStream(kf)) }' android/app/build.gradle
            sed -i 's/buildTypes {/signingConfigs { release { keyAlias kp["keyAlias"]; keyPassword kp["keyPassword"]; storeFile kp["storeFile"] ? file(kp["storeFile"]) : null; storePassword kp["storePassword"] } }\n    buildTypes {/' android/app/build.gradle
            sed -i '/release {/a\            signingConfig signingConfigs.release' android/app/build.gradle
          fi

          flutter pub get

          # ── App Armor: pre-build injection (layers 3–4) ────────────────────
          if [ "${{ inputs.protect }}" = "true" ]; then
            echo "=== App Armor: injecting protection layers ==="

            # Layer 4: Network Security Config — reject user-installed CAs (blocks Burp/Charles/HTTP Canary MITM)
            MANIFEST=$(find android -name "AndroidManifest.xml" -path "*/main/AndroidManifest.xml" | head -1)
            RES_XML_DIR="android/app/src/main/res/xml"
            mkdir -p "$RES_XML_DIR"
            echo "" | base64 -d > "$RES_XML_DIR/network_security_config.xml"
            echo "Layer 4: network_security_config.xml ✓"
            if [ -n "$MANIFEST" ] && ! grep -q "networkSecurityConfig" "$MANIFEST"; then
              sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
              echo "Layer 4: networkSecurityConfig wired into AndroidManifest.xml ✓"
            fi
            # ── ProGuard: inject Activity keep rules (R8 code-shrinking fix) ─────
            # R8 silently removes MainActivity when minifyEnabled=true and project
            # ProGuard files are absent or incomplete. Write a guaranteed keep file
            # via base64-decode (safe in YAML block scalars) then wire into build.gradle.
            ARMOR_PRO="android/app/cbe_armor.pro"
            mkdir -p "$(dirname "$ARMOR_PRO")"
            echo "" | base64 -d > "$ARMOR_PRO"
            BUILD_GRADLE=$(find android -name "build.gradle" -path "*/app/build.gradle" | head -1)
            if [ -n "$BUILD_GRADLE" ]; then
              sed -i "s|proguardFiles |proguardFiles 'cbe_armor.pro', |" "$BUILD_GRADLE" || true
              echo "App Armor: Activity keep rules injected into build.gradle ✓"
            fi
            echo "=== Pre-build injection complete ==="
          fi

          # ── Build (layers 1-2: obfuscation + debug-symbol strip, release only) ─
          if [ "${{ inputs.protect }}" = "true" ] && [ "$BUILD_MODE" = "release" ]; then
            echo "Layers 1-2: --obfuscate --split-debug-info (release mode)"
            flutter build apk --$BUILD_MODE --target-platform android-arm64 --no-pub \
              --obfuscate --split-debug-info=/tmp/dart-symbols
          else
            flutter build apk --$BUILD_MODE --target-platform android-arm64 --no-pub
          fi

          APK_PATH="/tmp/project/build/app/outputs/flutter-apk/app-${BUILD_MODE}.apk"

          # -- Layer 3: Snapshot Hash Erasure + ELF Symbol Scrambling + Optional XOR Payload Encrypt --
          # A: Rename all _kDart* symbol names in .dynstr to random garbage (blutter can't find by name)
          # B: Zero the 32-byte Dart snapshot hash in VmSnapshotData + IsolateSnapshotData
          # C: Zero the Dart features string (prevents version/arch fingerprinting)
          # D: XOR-encrypt payload bytes (only when libcbe_native.so is bundled in APK for runtime decrypt)
          if [ "${{ inputs.protect }}" = "true" ] && [ -f "$APK_PATH" ]; then
            echo "Layer 3: Applying snapshot protection (hash erasure + symbol scrambling)..."
            LAYER3_PY="/tmp/layer3_repack.py"
            echo "" | base64 -d > "$LAYER3_PY"
            if CBE_APK_PATH="$APK_PATH" python3 "$LAYER3_PY"; then
              echo "Layer 3: APK structure verified OK"
              ALIGNED_APK="/tmp/apk_armor_aligned.apk"
              rm -f "$ALIGNED_APK"
              zipalign -f 4 "$APK_PATH" "$ALIGNED_APK"
              KS_FILE=$(grep "^storeFile=" /tmp/key.properties | cut -d= -f2-)
              KS_PASS=$(grep "^storePassword=" /tmp/key.properties | cut -d= -f2-)
              KEY_ALIAS=$(grep "^keyAlias=" /tmp/key.properties | cut -d= -f2-)
              KEY_PASS=$(grep "^keyPassword=" /tmp/key.properties | cut -d= -f2-)
              apksigner sign \
                --ks "$KS_FILE" \
                --ks-pass "pass:$KS_PASS" \
                --ks-key-alias "$KEY_ALIAS" \
                --key-pass "pass:$KEY_PASS" \
                --out "$APK_PATH" \
                "$ALIGNED_APK"
              echo "Layer 3: APK signed ✓"
            else
              echo "Layer 3: Python patch failed - using unpatched APK"
            fi
            rm -f /tmp/layer3_repack.py /tmp/apk_armor_aligned.apk
          fi

          echo "BUILD_OUTPUT=$APK_PATH" >> $GITHUB_ENV

      # ── 10b. BUILD: React Native ─────────────────────────────────────────────
      - name: Build React Native APK
        if: steps.detect.outputs.type == 'reactnative'
        working-directory: /tmp/project
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

          # ── Android compatibility patches ────────────────────────────────────
          echo "Patching node_modules build.gradle files..."
          find node_modules -name "build.gradle" ! -path "*/build/*" \
            -exec sed -i -E \
              -e 's/\btestCompile\b/testImplementation/g' \
              -e 's/\bandroidTestCompile\b/androidTestImplementation/g' \
              -e 's/\bcompile\b/implementation/g' \
              -e 's/\bprovided\b/compileOnly/g' \
              -e 's/\bapt\b/annotationProcessor/g' \
              -e 's/compileSdkVersion [12][0-9]/compileSdkVersion 33/g' \
              -e 's/targetSdkVersion [12][0-9]/targetSdkVersion 33/g' \
            {} \; 2>/dev/null || true

          echo "Patching AndroidX imports in node_modules Java/Kotlin sources..."
          find node_modules -path "*/src/main/java/*" \( -name "*.java" -o -name "*.kt" \) \
            ! -path "*/build/*" -exec sed -i \
              -e 's|import android\.support\.annotation\.|import androidx.annotation.|g' \
              -e 's|import android\.support\.v4\.app\.|import androidx.|g' \
              -e 's|import android\.support\.v4\.content\.|import androidx.core.content.|g' \
              -e 's|import android\.support\.v4\.util\.|import androidx.collection.|g' \
              -e 's|import android\.support\.v4\.|import androidx.legacy.v4.|g' \
              -e 's|import android\.support\.v7\.app\.|import androidx.appcompat.app.|g' \
              -e 's|import android\.support\.v7\.|import androidx.appcompat.|g' \
              -e 's|import android\.support\.design\.|import com.google.android.material.|g' \
            {} \; 2>/dev/null || true

          echo "Running jetifier..."
          jetify 2>/dev/null || npx jetifier 2>/dev/null || true

          # ── Strip AndroidIDE overrides + boost Gradle JVM ────────────────────
          ANDROID_DIR=android
          PROPS="$ANDROID_DIR/gradle.properties"
          if [ -f "$PROPS" ]; then
            sed -i '/org\.gradle\.java\.home\s*=/d' "$PROPS" 2>/dev/null || true
            sed -i '/android\.aapt2FromMavenOverride\s*=/d' "$PROPS" 2>/dev/null || true
            sed -i '/com\.itsaky\.androidide/d' "$PROPS" 2>/dev/null || true
            sed -i '/\/data\/\(user\|data\)\/[0-9]/d' "$PROPS" 2>/dev/null || true
          fi
          for KEY_VAL in \
            "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" \
            "org.gradle.daemon=false" \
            "org.gradle.caching=true" \
            "android.useAndroidX=true" \
            "android.enableJetifier=true"; do
            KEY="${KEY_VAL%%=*}"
            grep -q "^${KEY}=" "$PROPS" 2>/dev/null || echo "$KEY_VAL" >> "$PROPS"
          done

          # ── Restore missing gradle-wrapper.jar ───────────────────────────────
          WRAPPER_JAR="$ANDROID_DIR/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "gradle-wrapper.jar missing — downloading..."
            mkdir -p "$ANDROID_DIR/gradle/wrapper"
            curl -fsSL -o "$WRAPPER_JAR" \
              https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar || true
          fi

          # ── Upgrade Gradle wrapper if too old for Java 17 (<7.3) ─────────────
          WRAPPER_PROPS="$ANDROID_DIR/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_PROPS" ]; then
            GRAD_VER=$(grep -oP 'gradle-\K[\d.]+(?=-(?:bin|all)\.zip)' "$WRAPPER_PROPS" | head -1)
            GRAD_MAJOR=$(echo "$GRAD_VER" | cut -d. -f1)
            GRAD_MINOR=$(echo "$GRAD_VER" | cut -d. -f2)
            if [ -n "$GRAD_MAJOR" ] && { [ "$GRAD_MAJOR" -lt 7 ] || { [ "$GRAD_MAJOR" -eq 7 ] && [ "$GRAD_MINOR" -lt 3 ]; }; }; then
              echo "Gradle $GRAD_VER too old for Java 17 — upgrading to 7.6.4"
              sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.4-bin.zip|' "$WRAPPER_PROPS"
            fi
          fi

          # ── Fix duplicate .so conflict ────────────────────────────────────────
          APP_BG="$ANDROID_DIR/app/build.gradle"
          if [ -f "$APP_BG" ] && ! grep -q "pickFirst" "$APP_BG"; then
            if grep -q "packagingOptions" "$APP_BG"; then
              sed -i "s/packagingOptions\s*{/packagingOptions {\n        pickFirst 'lib\/**\/*.so'/" "$APP_BG" || true
            else
              sed -i "s/android\s*{/android {\n    packagingOptions {\n        pickFirst 'lib\/**\/*.so'\n    }/" "$APP_BG" || true
            fi
          fi

          cp /tmp/key.properties android/key.properties
          cp /tmp/release.keystore android/app/release.keystore
          cd android
          chmod +x gradlew
          ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\\\u&/') \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon
          cd ..
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "BUILD_OUTPUT=$APK" >> $GITHUB_ENV

      # ── 10c. BUILD: Native Android / Expo (after prebuild) ───────────────────
      - name: Build Native Android APK
        if: steps.detect.outputs.type == 'android' || steps.detect.outputs.type == 'unknown' || steps.detect.outputs.type == 'expo'
        working-directory: /tmp/project
        run: |
          # ── Android compatibility patches (node_modules) ─────────────────────
          echo "Patching node_modules build.gradle files..."
          find . -path "*/node_modules/*" -name "build.gradle" ! -path "*/build/*" \
            -exec sed -i -E \
              -e 's/\btestCompile\b/testImplementation/g' \
              -e 's/\bandroidTestCompile\b/androidTestImplementation/g' \
              -e 's/\bcompile\b/implementation/g' \
              -e 's/\bprovided\b/compileOnly/g' \
              -e 's/\bapt\b/annotationProcessor/g' \
              -e 's/compileSdkVersion [12][0-9]/compileSdkVersion 33/g' \
              -e 's/targetSdkVersion [12][0-9]/targetSdkVersion 33/g' \
            {} \; 2>/dev/null || true

          echo "Patching AndroidX imports in node_modules Java/Kotlin sources..."
          find . -path "*/node_modules/*" -path "*/src/main/java/*" \
            \( -name "*.java" -o -name "*.kt" \) ! -path "*/build/*" \
            -exec sed -i \
              -e 's|import android\.support\.annotation\.|import androidx.annotation.|g' \
              -e 's|import android\.support\.v4\.app\.|import androidx.|g' \
              -e 's|import android\.support\.v4\.content\.|import androidx.core.content.|g' \
              -e 's|import android\.support\.v4\.util\.|import androidx.collection.|g' \
              -e 's|import android\.support\.v4\.|import androidx.legacy.v4.|g' \
              -e 's|import android\.support\.v7\.app\.|import androidx.appcompat.app.|g' \
              -e 's|import android\.support\.v7\.|import androidx.appcompat.|g' \
              -e 's|import android\.support\.design\.|import com.google.android.material.|g' \
            {} \; 2>/dev/null || true

          echo "Running jetifier..."
          # Use globally pre-installed jetifier; fall back to npx silently
          jetify 2>/dev/null || npx jetifier 2>/dev/null || true

          # ── Find gradlew anywhere in the tree (excluding node_modules) ────────
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: No gradlew found. Make sure your ZIP contains a valid Android project."
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew at: $GRADLEW_PATH (dir: $GRADLE_DIR)"

          # ── Strip AndroidIDE overrides + boost Gradle JVM ────────────────────
          PROPS="$GRADLE_DIR/gradle.properties"
          if [ -f "$PROPS" ]; then
            sed -i '/org\.gradle\.java\.home\s*=/d' "$PROPS" 2>/dev/null || true
            sed -i '/android\.aapt2FromMavenOverride\s*=/d' "$PROPS" 2>/dev/null || true
            sed -i '/com\.itsaky\.androidide/d' "$PROPS" 2>/dev/null || true
            sed -i '/\/data\/\(user\|data\)\/[0-9]/d' "$PROPS" 2>/dev/null || true
          fi
          for KEY_VAL in \
            "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" \
            "org.gradle.daemon=false" \
            "org.gradle.caching=true" \
            "android.useAndroidX=true" \
            "android.enableJetifier=true"; do
            KEY="${KEY_VAL%%=*}"
            grep -q "^${KEY}=" "$PROPS" 2>/dev/null || echo "$KEY_VAL" >> "$PROPS"
          done

          # ── Restore missing gradle-wrapper.jar ───────────────────────────────
          WRAPPER_JAR="$GRADLE_DIR/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "gradle-wrapper.jar missing — downloading..."
            mkdir -p "$GRADLE_DIR/gradle/wrapper"
            curl -fsSL -o "$WRAPPER_JAR" \
              https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar || true
          fi

          # ── Upgrade Gradle wrapper if too old for Java 17 (<7.3) ─────────────
          WRAPPER_PROPS="$GRADLE_DIR/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_PROPS" ]; then
            GRAD_VER=$(grep -oP 'gradle-\K[\d.]+(?=-(?:bin|all)\.zip)' "$WRAPPER_PROPS" | head -1)
            GRAD_MAJOR=$(echo "$GRAD_VER" | cut -d. -f1)
            GRAD_MINOR=$(echo "$GRAD_VER" | cut -d. -f2)
            if [ -n "$GRAD_MAJOR" ] && { [ "$GRAD_MAJOR" -lt 7 ] || { [ "$GRAD_MAJOR" -eq 7 ] && [ "$GRAD_MINOR" -lt 3 ]; }; }; then
              echo "Gradle $GRAD_VER too old for Java 17 — upgrading wrapper to 7.6.4"
              sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.4-bin.zip|' "$WRAPPER_PROPS"
            fi
          fi

          # ── Fix duplicate .so conflict ────────────────────────────────────────
          APP_BG="$GRADLE_DIR/app/build.gradle"
          if [ -f "$APP_BG" ] && ! grep -q "pickFirst" "$APP_BG"; then
            if grep -q "packagingOptions" "$APP_BG"; then
              sed -i "s/packagingOptions\s*{/packagingOptions {\n        pickFirst 'lib\/**\/*.so'/" "$APP_BG" || true
            else
              sed -i "s/android\s*{/android {\n    packagingOptions {\n        pickFirst 'lib\/**\/*.so'\n    }/" "$APP_BG" || true
            fi
          fi

          # Copy key.properties
          cp /tmp/key.properties "$GRADLE_DIR/key.properties" 2>/dev/null || true
          cp /tmp/key.properties "$GRADLE_DIR/../key.properties" 2>/dev/null || true

          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\u&/') \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon
          cd -
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "BUILD_OUTPUT=$(realpath $APK)" >> $GITHUB_ENV

      # ── 11. Sign APK ──────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          # Read signing credentials from key.properties (set in step 8)
          STORE_PASS=$(grep "^storePassword=" /tmp/key.properties | cut -d= -f2-)
          KEY_PASS=$(grep "^keyPassword="    /tmp/key.properties | cut -d= -f2-)
          KEY_ALIAS_VAL=$(grep "^keyAlias="  /tmp/key.properties | cut -d= -f2-)

          INPUT="${BUILD_OUTPUT}"
          ALIGNED="/tmp/aligned.apk"
          SIGNED="/tmp/signed_final.apk"
          zipalign -v -p 4 "$INPUT" "$ALIGNED" 2>/dev/null || cp "$INPUT" "$ALIGNED"
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS_VAL" \
            --out "$SIGNED" \
            "$ALIGNED"
          apksigner verify "$SIGNED" && echo "APK signed and verified ✓"
          echo "Signed with alias: $KEY_ALIAS_VAL  |  source: $SIGNING_SOURCE"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -dc '[:alnum:]_-')
          FINAL="/tmp/${SAFE_NAME}_${BUILD_MODE}.apk"
          mv "$SIGNED" "$FINAL"
          echo "APK_PATH=$FINAL" >> $GITHUB_ENV
          echo "APK_NAME=${SAFE_NAME}_${BUILD_MODE}.apk" >> $GITHUB_ENV
          echo "Final APK: $(du -sh $FINAL | cut -f1)"

      # ── 12. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: ${{ env.APK_PATH }}

      # ── 13. Build summary ─────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## Cloud Build Engine — Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | $APP_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | $PACKAGE_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ steps.detect.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | $BUILD_MODE |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | $APK_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | ${SIGNING_SOURCE:-CBE default (cbe_release_key)} |" >> $GITHUB_STEP_SUMMARY
