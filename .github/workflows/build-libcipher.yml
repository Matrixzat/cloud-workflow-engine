name: Build libcipher.so

# ─────────────────────────────────────────────────────────────────────────────
# Single workflow that does everything:
#
#  Job 1 — build-ollvm
#    Checks whether the OLLVM clang-19 release asset already exists.
#    If it does → skips all compilation steps (takes ~10 s).
#    If it doesn't → builds OLLVM clang-19 from TIMER-err/ollvm-19 with
#    AArch64 + ARM targets (~40–90 min), packages it, and uploads it as a
#    GitHub release asset tagged "ollvm-clang-linux".
#    Re-run this job manually whenever you want to rebuild OLLVM from source.
#
#  Job 2 — build-guard
#    Downloads the OLLVM release asset, then compiles guard.cpp into:
#      libcipher_arm64.so   (OLLVM: all 8 passes — fla bcf sub sobf split ibr icall igv)
#      libcipher_armeabi.so (OLLVM: all 8 passes — same, ARM target)
#    NDK r25c provides the sysroot + libc++ static libs; OLLVM clang compiles;
#    NDK clang wrappers link (they carry all runtime libs).
#    Artifacts are uploaded and stay for 90 days.
#
# After the workflow succeeds, download the artifact zip and copy:
#   libcipher_arm64.so   → Dex2c Mega/src/main/jniLibs/arm64-v8a/libcipher.so
#   libcipher_armeabi.so → Dex2c Mega/src/main/jniLibs/armeabi-v7a/libcipher.so
# Then commit + push and rebuild the APK.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    paths:
      - 'cpp/guard.cpp'
      - 'cpp/guard_pstrings.inc'
      - '.github/workflows/build-libcipher.yml'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build OLLVM clang (skipped if release asset already exists)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-ollvm:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write   # needed to create/update the release asset

    outputs:
      asset_id: ${{ steps.resolve.outputs.asset_id }}

    steps:
      - name: Check if OLLVM asset already exists
        id: check
        run: |
          ASSET_ID=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/ollvm-clang-linux" \
            | jq -r '.assets[]? | select(.name=="ollvm-clang-linux-x86_64.tar.xz") | .id' \
            | head -1)
          echo "asset_id=${ASSET_ID}" >> $GITHUB_OUTPUT
          if [ -n "$ASSET_ID" ]; then
            echo "✅ OLLVM asset exists (ID: $ASSET_ID) — skipping rebuild"
          else
            echo "⚠️  No OLLVM asset found — will build from source"
          fi

      # ── All steps below are skipped when the asset already exists ───────────

      - name: Install build dependencies
        if: steps.check.outputs.asset_id == ''
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake python3 git lld
          echo "Cores: $(nproc)"

      - name: Clone OLLVM source (shallow)
        if: steps.check.outputs.asset_id == ''
        run: |
          git clone --depth=1 https://github.com/TIMER-err/ollvm-19 /tmp/ollvm-src
          git -C /tmp/ollvm-src rev-parse HEAD > /tmp/ollvm-src-hash.txt
          cat /tmp/ollvm-src-hash.txt

      - name: Restore build cache
        id: cache-ollvm
        if: steps.check.outputs.asset_id == ''
        uses: actions/cache@v4
        with:
          path: /tmp/ollvm-install
          key: ollvm-install-${{ runner.os }}-AArch64-ARM-${{ hashFiles('/tmp/ollvm-src-hash.txt') }}

      - name: Configure CMake
        if: steps.check.outputs.asset_id == '' && steps.cache-ollvm.outputs.cache-hit != 'true'
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DCLANG_INCLUDE_TESTS=OFF \
            -DCLANG_INCLUDE_DOCS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld" \
            -DCMAKE_INSTALL_PREFIX=/tmp/ollvm-install \
            -B /tmp/ollvm-build \
            /tmp/ollvm-src/llvm

      - name: Build clang
        if: steps.check.outputs.asset_id == '' && steps.cache-ollvm.outputs.cache-hit != 'true'
        run: ninja -C /tmp/ollvm-build -j$(nproc) clang

      - name: Install clang
        if: steps.check.outputs.asset_id == '' && steps.cache-ollvm.outputs.cache-hit != 'true'
        run: |
          ninja -C /tmp/ollvm-build install-clang install-clang-resource-headers
          /tmp/ollvm-install/bin/clang --version

      - name: Smoke-test OLLVM passes (arm64 + arm32)
        if: steps.check.outputs.asset_id == ''
        run: |
          echo "int main(){return 0;}" > /tmp/test.c
          /tmp/ollvm-install/bin/clang \
            --target=aarch64-linux-android26 \
            -mllvm -fla -mllvm -bcf -mllvm -sub \
            -fPIC -O2 -c /tmp/test.c -o /tmp/test_arm64.o
          echo "✅ OLLVM arm64 passes OK"
          /tmp/ollvm-install/bin/clang \
            --target=armv7a-linux-androideabi26 \
            -mllvm -fla -mllvm -bcf -mllvm -sub \
            -fPIC -O2 -c /tmp/test.c -o /tmp/test_arm32.o
          echo "✅ OLLVM armeabi passes OK"

      - name: Package
        if: steps.check.outputs.asset_id == ''
        run: |
          tar -cJf /tmp/ollvm-clang-linux-x86_64.tar.xz \
            -C /tmp ollvm-install
          du -sh /tmp/ollvm-clang-linux-x86_64.tar.xz

      - name: Upload to release
        if: steps.check.outputs.asset_id == ''
        run: |
          # Create release (ignore error if already exists)
          REL_ID=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d '{"tag_name":"ollvm-clang-linux","name":"OLLVM Clang (Linux x86_64)","body":"OLLVM clang-19 built from TIMER-err/ollvm-19 with AArch64+ARM targets. All 8 obfuscation passes: fla bcf sub sobf split ibr icall igv.","prerelease":true}' \
            | jq -r '.id // empty')
          if [ -z "$REL_ID" ]; then
            REL_ID=$(curl -s \
              -H "Authorization: Bearer ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/ollvm-clang-linux" \
              | jq -r '.id')
          fi
          echo "Release ID: $REL_ID"
          # Delete old asset if present
          OLD=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$REL_ID/assets" \
            | jq -r '.[] | select(.name=="ollvm-clang-linux-x86_64.tar.xz") | .id')
          [ -n "$OLD" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$OLD"
          # Upload new asset
          curl -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/x-xz" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$REL_ID/assets?name=ollvm-clang-linux-x86_64.tar.xz" \
            --data-binary @/tmp/ollvm-clang-linux-x86_64.tar.xz \
            | jq '{id, name, size}'

      - name: Resolve asset ID (for build-guard job)
        id: resolve
        run: |
          ASSET_ID=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/ollvm-clang-linux" \
            | jq -r '.assets[] | select(.name=="ollvm-clang-linux-x86_64.tar.xz") | .id' \
            | head -1)
          echo "asset_id=${ASSET_ID}" >> $GITHUB_OUTPUT
          echo "OLLVM asset ID: $ASSET_ID"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build libcipher.so (arm64 + armeabi, all 8 OLLVM passes)
# ─────────────────────────────────────────────────────────────────────────────
  build-guard:
    runs-on: ubuntu-latest
    needs: build-ollvm
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c (sysroot + libc++)
        run: |
          yes | sdkmanager "ndk;25.2.9519653" 2>/dev/null || true
          echo "NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Download OLLVM clang-19
        run: |
          ASSET_ID="${{ needs.build-ollvm.outputs.asset_id }}"
          echo "Downloading OLLVM asset ID: $ASSET_ID"
          curl -L -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
            -o ollvm-clang-linux-x86_64.tar.xz
          echo "Downloaded: $(du -sh ollvm-clang-linux-x86_64.tar.xz | cut -f1)"
          tar -xJf ollvm-clang-linux-x86_64.tar.xz
          chmod +x ollvm-install/bin/clang++
          echo "✅ OLLVM: $(ollvm-install/bin/clang++ --version | head -1)"
          echo "OLLVM_BIN=$PWD/ollvm-install/bin/clang++" >> $GITHUB_ENV

      - name: Resolve toolchain paths
        run: |
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          # OLLVM clang — compile (obfuscation passes)
          echo "CLANG_ARM64=$OLLVM_BIN"                                    >> $GITHUB_ENV
          echo "CLANG_ARM32=$OLLVM_BIN"                                    >> $GITHUB_ENV
          # NDK clang wrappers — link only (carry all runtime libs)
          echo "NDK_LINK_ARM64=$TC/bin/aarch64-linux-android26-clang++"    >> $GITHUB_ENV
          echo "NDK_LINK_ARM32=$TC/bin/armv7a-linux-androideabi26-clang++" >> $GITHUB_ENV
          echo "SYSROOT=$TC/sysroot"                                       >> $GITHUB_ENV

      - name: Confirm OLLVM passes active
        run: |
          echo "int x;" > /tmp/probe.c
          if "$OLLVM_BIN" --target=aarch64-linux-android26 \
               --sysroot="$SYSROOT" -mllvm -fla \
               -x c -c /tmp/probe.c -o /tmp/probe.o 2>/dev/null; then
            echo "OLLVM_FLAGS=-mllvm -fla -mllvm -bcf -mllvm -bcf_prob=60 -mllvm -bcf_loop=1 -mllvm -sub -mllvm -sub_loop=1 -mllvm -sobf -mllvm -split -mllvm -split_num=2 -mllvm -ibr -mllvm -icall" >> $GITHUB_ENV
            echo "✅ OLLVM passes confirmed: fla bcf(60%×1) sub(×1) sobf split(2) ibr icall"
          else
            echo "OLLVM_FLAGS=" >> $GITHUB_ENV
            echo "⚠️  OLLVM passes not responding — building without obfuscation"
          fi

      - name: Build libcipher.so
        run: |
          set -e
          SRC="cpp"
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"

          # Static C++ runtime (suppresses auto-link of libc++_shared.so)
          CPP_STATIC_ARM64=$(find "$TC" -name "libc++_static.a" | grep  "aarch64" | head -1)
          CPP_ABI_ARM64=$(   find "$TC" -name "libc++abi.a"     | grep  "aarch64" | head -1)
          CPP_STATIC_ARM32=$(find "$TC" -name "libc++_static.a" | grep -v "aarch64" | head -1)
          CPP_ABI_ARM32=$(   find "$TC" -name "libc++abi.a"     | grep -v "aarch64" | head -1)

          COMMON_BASE=(
            --sysroot="$SYSROOT"
            -fPIC -O2 -g0
            -fno-unwind-tables -fno-asynchronous-unwind-tables
            -fexceptions -frtti
            -fvisibility=hidden
            -ffunction-sections -fdata-sections
            -D__ANDROID__ -DANDROID
            -DFONTS_DEBUG_LOG
            -I"$SRC"
          )

          COMMON_OLLVM=("${COMMON_BASE[@]}")
          if [ -n "$OLLVM_FLAGS" ]; then
            read -ra OF <<< "$OLLVM_FLAGS"
            COMMON_OLLVM+=("${OF[@]}")
          fi

          GUARD="$SRC/guard.cpp"

          # ── arm64-v8a ────────────────────────────────────────────────────────
          echo "Building arm64-v8a…"
          "$CLANG_ARM64" --target=aarch64-linux-android26 \
            "${COMMON_OLLVM[@]}" -std=c++17 \
            -c "$GUARD" -o guard_arm64.o
          "$NDK_LINK_ARM64" \
            -shared -fPIC -Wl,--gc-sections -Wl,--build-id=none \
            -nostdlib++ "$CPP_STATIC_ARM64" "$CPP_ABI_ARM64" \
            -llog -lz -lm guard_arm64.o \
            -o libcipher_arm64.so
          echo "  ✅ libcipher_arm64.so — $(wc -c < libcipher_arm64.so) bytes"

          # ── armeabi-v7a ──────────────────────────────────────────────────────
          echo "Building armeabi-v7a…"
          "$CLANG_ARM32" --target=armv7a-linux-androideabi26 \
            "${COMMON_OLLVM[@]}" -std=c++17 \
            -c "$GUARD" -o guard_armeabi.o
          "$NDK_LINK_ARM32" \
            -shared -fPIC -Wl,--gc-sections -Wl,--build-id=none \
            -nostdlib++ "$CPP_STATIC_ARM32" "$CPP_ABI_ARM32" \
            -llog -lz -lm guard_armeabi.o \
            -o libcipher_armeabi.so
          echo "  ✅ libcipher_armeabi.so — $(wc -c < libcipher_armeabi.so) bytes"

      - name: Strip + harden binaries
        run: |
          TC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          STRIP="$TC/bin/llvm-strip"
          OBJCOPY="$TC/bin/llvm-objcopy"
          REMOVE_SECS=(.symtab .strtab .comment .note.android.ident .eh_frame .eh_frame_hdr)
          for SO in libcipher_arm64.so libcipher_armeabi.so; do
            "$STRIP" --strip-all "$SO"
            for SEC in "${REMOVE_SECS[@]}"; do
              "$OBJCOPY" --remove-section="$SEC" "$SO" 2>/dev/null || true
            done
            echo "  $SO → $(wc -c < "$SO") bytes"
            readelf -S "$SO" 2>/dev/null | grep '^\s*\[' | awk '{print "   ", $2}' | grep -v '^\s*\[Nr\]'
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cipher-binaries
          retention-days: 90
          path: |
            libcipher_arm64.so
            libcipher_armeabi.so
