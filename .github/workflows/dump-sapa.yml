name: Dump Sapa TV DEX

on:
  workflow_dispatch:

jobs:
  static-unpack:
    runs-on: ubuntu-latest
    outputs:
      got_real_dex: ${{ steps.check.outputs.got_real_dex }}
    steps:
      - name: Download Sapa TV APK
        run: wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" -O SapaTV.apk
      - name: Static jiagu_unpacker
        run: |
          pip3 install -q pycryptodome
          git clone -q --depth=1 https://x-access-token:${{ github.token }}@github.com/SafaSafari/jiagu_unpacker.git
          mkdir -p dumped_dex
          python3 jiagu_unpacker/jiagu_unpacker.py -apk SapaTV.apk -out dumped_dex 2>&1 || true
      - name: Check (classes*.dex only — not shell.dex)
        id: check
        run: |
          find dumped_dex -type f -exec ls -lh {} \; 2>/dev/null || echo "none"
          COUNT=$(find dumped_dex -name "classes*.dex" 2>/dev/null | wc -l)
          echo "Real DEX: $COUNT"
          echo "got_real_dex=$COUNT" >> $GITHUB_OUTPUT
      - name: Upload static result
        if: steps.check.outputs.got_real_dex > 0
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-static-dex
          path: dumped_dex/
          retention-days: 7

  runtime-dump:
    runs-on: ubuntu-latest
    needs: static-unpack
    if: needs.static-unpack.outputs.got_real_dex == '0' || needs.static-unpack.outputs.got_real_dex == ''
    timeout-minutes: 45
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APKs
        run: |
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" -O SapaTV.apk
          wget -q "https://github.com/CodingGay/BlackDex/releases/download/v3.2/app-BlackDex64.apk" -O BlackDex.apk
          echo "SapaTV: $(ls -lh SapaTV.apk | awk '{print $5}')"
          echo "BlackDex: $(ls -lh BlackDex.apk | awk '{print $5}')"

      - name: Write dump script
        run: |
          cat > /tmp/dump.sh << 'SCRIPT'
          #!/usr/bin/env bash
          ADB=/usr/local/lib/android/sdk/platform-tools/adb
          BPKG=top.niunaijun.blackdex
          TARGET=com.mm.droid.livetv.mobile31027704
          mkdir -p dumped_dex

          echo "=== Install Sapa TV ==="
          $ADB install -r SapaTV.apk
          INST=$($ADB shell pm list packages | grep "$TARGET" | wc -l)
          echo "Sapa TV installed: $INST"

          echo "=== Install BlackDex (hardcoded pkg: $BPKG) ==="
          $ADB install -r BlackDex.apk && echo "BlackDex OK"
          $ADB shell pm list packages | grep niunaijun || echo "BlackDex pkg not found!"

          $ADB shell pm grant "$BPKG" android.permission.READ_EXTERNAL_STORAGE  2>/dev/null || true
          $ADB shell pm grant "$BPKG" android.permission.WRITE_EXTERNAL_STORAGE 2>/dev/null || true
          $ADB shell appops set "$BPKG" MANAGE_EXTERNAL_STORAGE allow            2>/dev/null || true

          echo "=== Launch Sapa TV (init Jiagu loader) ==="
          $ADB shell monkey -p "$TARGET" -c android.intent.category.LAUNCHER 1 || true
          sleep 12

          echo "=== Launch BlackDex ==="
          $ADB shell am start -n "$BPKG/top.niunaijun.blackdex.MainActivity" --es packageName "$TARGET" 2>&1 || true
          echo "Waiting 90s..."
          sleep 90

          $ADB pull /sdcard/BlackDex/$TARGET/ ./dumped_dex/ 2>/dev/null || \
          $ADB pull /sdcard/BlackDex/         ./dumped_dex/ 2>/dev/null || true

          COUNT=$(find dumped_dex -name "*.dex" | wc -l)
          echo "BlackDex: $COUNT dex files"

          # frida-dexdump fallback
          if [ "$COUNT" -lt 1 ]; then
            echo "=== frida-dexdump fallback ==="
            pip3 install -q frida-tools frida-dexdump
            FV=$(python3 -c "import frida; print(frida.__version__)")
            echo "Frida version: $FV"
            wget -q "https://github.com/frida/frida/releases/download/${FV}/frida-server-${FV}-android-x86_64.xz" -O fs.xz
            xz -d fs.xz
            # find the actual extracted filename
            FS=$(ls frida-server-* 2>/dev/null | head -1)
            echo "Frida server file: $FS"
            if [ -n "$FS" ]; then
              $ADB push "$FS" /data/local/tmp/frida-server
              $ADB shell "chmod +x /data/local/tmp/frida-server && /data/local/tmp/frida-server &"
              sleep 6
              $ADB shell monkey -p "$TARGET" -c android.intent.category.LAUNCHER 1 || true
              sleep 20
              frida-dexdump -U -f "$TARGET" -o ./dumped_dex/ || true
            else
              echo "frida-server not found after extract"
            fi
          fi

          echo "=== Final ==="
          find dumped_dex -type f | xargs ls -lh 2>/dev/null || echo "Nothing dumped"
          SCRIPT
          chmod +x /tmp/dump.sh

      - name: Run emulator + dump
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel
          target: google_apis
          avd-name: SapaDumpAVD
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: /tmp/dump.sh

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-runtime-dex
          path: dumped_dex/
          retention-days: 7
