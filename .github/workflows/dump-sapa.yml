name: Dump Sapa TV DEX

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q wget unzip python3-pip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH

      - name: Install SDK packages
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "emulator" "system-images;android-30;google_apis;x86_64"

      - name: Create & Start Emulator
        run: |
          echo "no" | $HOME/android-sdk/cmdline-tools/latest/bin/avdmanager create avd -n sapa_avd -k "system-images;android-30;google_apis;x86_64" --force
          $HOME/android-sdk/emulator/emulator -avd sapa_avd -no-window -no-audio -no-snapshot -gpu swiftshader_indirect &
          echo "Waiting for boot..."
          $HOME/android-sdk/platform-tools/adb wait-for-device
          timeout 300 bash -c 'until $HOME/android-sdk/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do sleep 5; echo "booting..."; done'
          $HOME/android-sdk/platform-tools/adb shell input keyevent 82
          echo "Emulator ready"

      - name: Download & Install APK
        run: |
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" -O SapaTV.apk
          ls -lh SapaTV.apk
          $HOME/android-sdk/platform-tools/adb install -r SapaTV.apk
          echo "Installed OK"

      - name: Install Frida + frida-dexdump
        run: |
          pip3 install frida-tools frida-dexdump
          FRIDA_VER=$(python3 -c "import frida; print(frida.__version__)")
          echo "Frida: $FRIDA_VER"
          wget -q "https://github.com/frida/frida/releases/download/${FRIDA_VER}/frida-server-${FRIDA_VER}-android-x86_64.xz" -O fs.xz
          xz -d fs.xz
          mv frida-server-* frida-bin
          $HOME/android-sdk/platform-tools/adb push frida-bin /data/local/tmp/frida-server
          $HOME/android-sdk/platform-tools/adb shell "chmod +x /data/local/tmp/frida-server"

      - name: Launch app + dump DEX
        run: |
          $HOME/android-sdk/platform-tools/adb shell "/data/local/tmp/frida-server &" &
          sleep 5
          $HOME/android-sdk/platform-tools/adb shell "monkey -p com.mm.droid.livetv.mobile31027704 -c android.intent.category.LAUNCHER 1" || true
          sleep 20
          mkdir -p dumped_dex
          frida-dexdump -U -f com.mm.droid.livetv.mobile31027704 -o ./dumped_dex/ || true
          echo "=== Dumped files ==="
          ls -lh dumped_dex/

      - name: Upload dumped DEX
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-dumped-dex
          path: dumped_dex/
          retention-days: 7
