name: PairipX APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Install tools
        run: sudo apt-get install -y --no-install-recommends unzip python3 wget

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Download Gradle 8.2 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          export GRADLE=/opt/gradle-8.2/bin/gradle
          echo "GRADLE=$GRADLE" >> $GITHUB_ENV
          $GRADLE --version

      - name: Download PairipX source
        run: |
          mkdir -p /tmp/project
          curl -L -f -o /tmp/source.zip "https://979791c9-5f5f-48c4-94c5-e8a933ccc599-00-27qowasz9vdfp.kirk.replit.dev/dl/PairipX.zip"
          echo "Downloaded: $(du -sh /tmp/source.zip | cut -f1)"
          unzip -q /tmp/source.zip -d /tmp/extracted
          TOP=$(ls /tmp/extracted/ | head -1)
          mv /tmp/extracted/$TOP/* /tmp/project/ 2>/dev/null || mv /tmp/extracted/$TOP/. /tmp/project/ 2>/dev/null || true
          echo "Project root:"; ls /tmp/project/

      - name: Verify engine JAR and assets
        run: |
          echo "=== JARs ==="
          find /tmp/project/app/libs -name '*.jar' -exec du -sh {} \;
          echo "=== Assets ==="
          ls /tmp/project/app/src/main/assets/ 2>/dev/null || echo 'no assets dir'
          echo "=== JNI libs ==="
          find /tmp/project/app/src/main/jniLibs -name '*.so' -exec du -sh {} \; 2>/dev/null || echo 'no jniLibs'

      - name: Fix gradle.properties
        run: |
          cat > /tmp/project/gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.caching=false
org.gradle.parallel=false
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false
android.suppressUnsupportedCompileSdk=34
EOF

      - name: Build APK
        working-directory: /tmp/project
        run: |
          $GRADLE assembleDebug \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            --stacktrace \
            -Dorg.gradle.jvmargs=-Xmx4g \
            2>&1 | tee /tmp/build.log
          echo "Build exit: ${PIPESTATUS[0]}"

      - name: Find and check APK
        run: |
          APK=$(find /tmp/project/app/build/outputs/apk -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK in outputs! Looking everywhere..."
            find /tmp/project -name '*.apk' -not -path '*/assets/*' -not -path '*/intermediates/*' 2>/dev/null
            tail -50 /tmp/build.log
            exit 1
          fi
          echo "APK: $APK  size: $(du -sh $APK | cut -f1)"
          python3 -c "
import zipfile
with zipfile.ZipFile('$APK') as z:
    total=sum(i.file_size for i in z.infolist())
    print('Contents:', len(z.namelist()), 'files,', round(total/1024/1024,2), 'MB uncompressed')
    for i in z.infolist():
        if i.file_size > 10000:
            print(' ', round(i.file_size/1024), 'KB', i.filename)
"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          echo "apksigner: $APKSIGNER"
          keytool -genkey -v -keystore /tmp/debug.jks \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=PairipX,O=PairipX,C=US" -noprompt
          $APKSIGNER sign --ks /tmp/debug.jks --ks-pass pass:android \
            --key-pass pass:android --ks-key-alias debug \
            --out /tmp/PairipX_signed.apk "$APK_PATH"
          echo "Signed: $(du -sh /tmp/PairipX_signed.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PairipX-apk
          path: /tmp/PairipX_signed.apk
          retention-days: 7
