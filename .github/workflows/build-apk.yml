name: Cloud Build Engine — Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name'
        required: true
        default: 'Cloud Build Engine'
      package_name:
        description: 'Android package name (e.g. com.example.app)'
        required: true
        default: 'com.matrix.cloudbuildengine'
      source_url:
        description: 'Source ZIP URL (GitHub repo URL, raw ZIP, or Google Drive share link)'
        required: true
      flutter_version:
        description: 'Flutter version to use'
        required: false
        default: '3.29.1'
      build_mode:
        description: 'Build mode: release | debug | profile'
        required: false
        default: 'release'

jobs:
  build:
    name: Build ${{ inputs.app_name }} (${{ inputs.build_mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_NAME:      ${{ inputs.app_name }}
      PACKAGE_NAME:  ${{ inputs.package_name }}
      SOURCE_URL:    ${{ inputs.source_url }}
      FLUTTER_VER:   ${{ inputs.flutter_version }}
      BUILD_MODE:    ${{ inputs.build_mode }}

    steps:

      # ── 1. System dependencies ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            unzip wget curl jq python3 python3-pip \
            openjdk-17-jdk-headless apksigner zipalign

      # ── 2. Set up Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter ${{ inputs.flutter_version }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor --android-licenses || true

      # ── 3. Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: >
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      # ── 4. Download & extract source ────────────────────────────────────────
      - name: Download source code
        run: |
          mkdir -p /tmp/source_raw /tmp/project
          RAW_URL="${SOURCE_URL}"

          # Detect Google Drive share link and convert
          if echo "$RAW_URL" | grep -q "drive.google.com/file/d/"; then
            FILE_ID=$(echo "$RAW_URL" | sed 's|.*drive.google.com/file/d/\([^/]*\).*|\1|')
            RAW_URL="https://drive.google.com/uc?export=download&confirm=t&id=${FILE_ID}"
            echo "Converted Drive link → $RAW_URL"
          fi

          # Detect GitHub repo URL (not a .zip link)
          if echo "$RAW_URL" | grep -qE "^https://github.com/[^/]+/[^/]+$"; then
            RAW_URL="${RAW_URL}/archive/refs/heads/main.zip"
            echo "GitHub repo → archive URL: $RAW_URL"
          fi

          echo "Downloading from: $RAW_URL"
          wget --content-disposition -q -O /tmp/source_raw/source.zip "$RAW_URL"
          echo "Download complete: $(du -sh /tmp/source_raw/source.zip | cut -f1)"

      - name: Extract source code
        run: |
          unzip -q /tmp/source_raw/source.zip -d /tmp/source_raw/extracted
          # Handle nested single-directory zips
          TOP=$(ls /tmp/source_raw/extracted/ | head -1)
          if [ -d "/tmp/source_raw/extracted/$TOP" ] && [ "$(ls /tmp/source_raw/extracted/ | wc -l)" -eq 1 ]; then
            mv "/tmp/source_raw/extracted/$TOP"/* /tmp/project/
          else
            mv /tmp/source_raw/extracted/* /tmp/project/
          fi
          echo "Project contents:"
          ls /tmp/project/

      # ── 5. Detect project type ──────────────────────────────────────────────
      - name: Detect & validate Flutter project
        working-directory: /tmp/project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml not found. This does not appear to be a Flutter project."
            exit 1
          fi
          echo "Flutter project detected ✓"
          grep "^name:" pubspec.yaml || true
          flutter --version

      # ── 6. Patch package name & app name ───────────────────────────────────
      - name: Patch package name and app name
        working-directory: /tmp/project
        run: |
          SAFE_PKG="${PACKAGE_NAME}"
          SAFE_NAME="${APP_NAME}"

          echo "Patching package: $SAFE_PKG"
          echo "Patching app name: $SAFE_NAME"

          # Patch AndroidManifest.xml
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            OLD_PKG=$(grep -oP 'package="\K[^"]+' android/app/src/main/AndroidManifest.xml | head -1)
            if [ -n "$OLD_PKG" ] && [ "$OLD_PKG" != "$SAFE_PKG" ]; then
              sed -i "s|package=\"${OLD_PKG}\"|package=\"${SAFE_PKG}\"|g" android/app/src/main/AndroidManifest.xml
              echo "Patched AndroidManifest: $OLD_PKG → $SAFE_PKG"
            fi
          fi

          # Patch build.gradle applicationId
          if [ -f "android/app/build.gradle" ]; then
            sed -i "s|applicationId \".*\"|applicationId \"${SAFE_PKG}\"|g" android/app/build.gradle
            sed -i "s|applicationId '.*'|applicationId '${SAFE_PKG}'|g" android/app/build.gradle
          fi

          # Patch app label in strings.xml or AndroidManifest
          if [ -f "android/app/src/main/res/values/strings.xml" ]; then
            sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${SAFE_NAME}</string>|" \
              android/app/src/main/res/values/strings.xml
          fi

          echo "Patching complete"

      # ── 7. Fix common build issues ──────────────────────────────────────────
      - name: Auto-fix gradle build issues
        working-directory: /tmp/project
        run: |
          # Fix deprecated compile/provided usages
          find . -name "build.gradle" | xargs sed -i \
            -e "s|compile '|implementation '|g" \
            -e "s|testCompile '|testImplementation '|g" \
            -e "s|provided '|compileOnly '|g" \
            -e "s|compile \"'|implementation \"|g" 2>/dev/null || true

          # Ensure compileSdkVersion is at least 34
          find . -name "build.gradle" | xargs sed -i \
            -e "s|compileSdkVersion [0-9]\{1,2\}|compileSdkVersion 35|g" \
            -e "s|targetSdkVersion [0-9]\{1,2\}|targetSdkVersion 35|g" 2>/dev/null || true

          # Accept Android licenses silently
          yes | flutter doctor --android-licenses 2>/dev/null || true
          echo "Gradle fixes applied"

      # ── 8. Flutter pub get ──────────────────────────────────────────────────
      - name: Get Flutter dependencies
        working-directory: /tmp/project
        run: |
          flutter pub get
          echo "Dependencies resolved ✓"

      # ── 9. Set up keystore (pre-generated, embedded — no secrets needed) ──────
      - name: Set up signing keystore
        working-directory: /tmp/project
        run: |
          # ── Keystore is embedded directly — generated for Cloud Build Engine ──
          # Alias : cbe_release_key
          # Valid : 2026-03-17  →  2053-08-02  (27 years)
          # Owner : CN=Cloud Build Engine, O=Matrix, C=NG
          cat > /tmp/ks.b64 << 'KSEOF'
          
          KSEOF

          # Strip whitespace and decode
          tr -d ' \n' < /tmp/ks.b64 | base64 -d > /tmp/release.keystore
          echo "Keystore decoded: $(ls -lh /tmp/release.keystore | awk '{print $5}')"

          # Write key.properties for Flutter gradle
          cat > android/key.properties <<EOF
          storePassword=CloudBuild@Matrix2026
          keyPassword=CloudBuild@Matrix2026
          keyAlias=cbe_release_key
          storeFile=/tmp/release.keystore
          EOF
          echo "key.properties written ✓"

          # Auto-patch build.gradle to use keystore if not already configured
          if ! grep -q "key.properties" android/app/build.gradle; then
            python3 - <<'PYEOF'
          import re

          gradle_path = "android/app/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()

          keystore_block = '''
          def keystorePropertiesFile = rootProject.file("key.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          '''
          signing_config = '''
              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                          storeFile file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                      }
                  }
              }
          '''
          if "keystorePropertiesFile" not in content:
              content = re.sub(r"(android\s*\{)", keystore_block + r"\1", content, count=1)
          if "signingConfigs" not in content:
              content = re.sub(r"(android\s*\{)", r"\1" + signing_config, content, count=1)
          content = re.sub(
              r"(buildTypes\s*\{[^}]*release\s*\{)",
              r"\1\n            signingConfig signingConfigs.release",
              content, flags=re.DOTALL
          )
          with open(gradle_path, "w") as f:
              f.write(content)
          print("build.gradle patched for keystore signing ✓")
          PYEOF
          fi
          echo "Signing setup complete ✓"

      # ── 10. Build APK ───────────────────────────────────────────────────────
      - name: Build Flutter APK (${{ inputs.build_mode }})
        working-directory: /tmp/project
        run: |
          echo "Building Flutter APK in $BUILD_MODE mode..."
          flutter build apk --$BUILD_MODE --target-platform android-arm64 --no-pub
          echo "Build complete ✓"

      # ── 11. Locate & rename APK ─────────────────────────────────────────────
      - name: Locate and rename APK
        working-directory: /tmp/project
        run: |
          APK_PATH=$(find build/app/outputs -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found after build"
            find build/ -name "*.apk" 2>/dev/null || true
            exit 1
          fi

          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -dc '[:alnum:]_-')
          FINAL_NAME="${SAFE_NAME}_${BUILD_MODE}_arm64.apk"
          cp "$APK_PATH" "/tmp/${FINAL_NAME}"
          echo "APK_NAME=${FINAL_NAME}" >> $GITHUB_ENV
          echo "APK_PATH=/tmp/${FINAL_NAME}" >> $GITHUB_ENV
          echo "APK ready: ${FINAL_NAME} ($(du -sh /tmp/${FINAL_NAME} | cut -f1))"

      # ── 12. Upload artifact ─────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 14

      # ── 13. Build summary ───────────────────────────────────────────────────
      - name: Write build summary
        if: always()
        run: |
          echo "## Cloud Build Engine — Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | $APP_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | $PACKAGE_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | $FLUTTER_VER |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Mode | $BUILD_MODE |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | $APK_NAME |" >> $GITHUB_STEP_SUMMARY
