name: Dump Sapa TV DEX (fast hook)

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: |
            /usr/local/lib/android/sdk/build-tools
            /usr/local/lib/android/sdk/platform-tools
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/emulator
            /usr/local/lib/android/sdk/system-images
          key: android-sdk-30-x86_64-v1

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: ~/.android/avd
          key: avd-30-x86_64-v1

      - name: Cache frida + APK
        uses: actions/cache@v4
        id: frida-cache
        with:
          path: |
            frida-server
            SapaTV.apk
          key: frida-sapamobile-v1

      - name: Install frida + download APKs + frida-server
        if: steps.frida-cache.outputs.cache-hit != 'true'
        run: |
          pip3 install -q frida-tools
          wget -q "https://www.dropbox.com/scl/fi/2jheqcz019z01rxp0fdja/Mobile-Sapa-TV_1.2.1_20260304_mobile.apk?rlkey=sxjzzrqkrp7bw0gl6matcgvmh&st=1vsin4ud&dl=1" -O SapaTV.apk &
          FV=$(python3 -c "import frida; print(frida.__version__)")
          echo "Frida: $FV"
          wget -q "https://github.com/frida/frida/releases/download/${FV}/frida-server-${FV}-android-x86_64.xz" -O frida-server.xz &
          wait
          xz -d frida-server.xz
          ls -lh frida-server SapaTV.apk

      - name: Install frida tools only (cache hit)
        if: steps.frida-cache.outputs.cache-hit == 'true'
        run: |
          pip3 install -q frida-tools
          ls -lh frida-server SapaTV.apk

      - name: Run emulator + fast hook dump
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel
          avd-name: SapaDump
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          force-avd-creation: false
          script: bash .github/scripts/dump.sh

      - name: Upload DEX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sapa-tv-dex
          path: dumped_dex/
          if-no-files-found: warn
          retention-days: 7
